<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sync Chords</title>
  <link rel="stylesheet" href="sync.css">
</head>
<body>
  <main class="syncRoot">
    <section class="syncCard">
      <h1>Sync chords</h1>
      <p class="muted">Use this window to sync your Charachorder dictionary from the connected device.</p>
      <div class="actions">
        <button id="syncNowButton" type="button">Sync chords</button>
        <button id="closeButton" type="button" class="secondary">Close</button>
      </div>
      <p id="syncStatus" class="status"></p>
    </section>
  </main>

  <script src="shared.js"></script>
  <script src="serial-sync.js"></script>
  <script src="sync.js"></script>
</body>
</html>
