<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chording Hints</title>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
<main class="popupRoot">
    <section class="popupCard popupSyncCard">
        <div class="popupTopRow">
            <button id="popupSyncButton" type="button" class="iconButton">Sync Chords <span class="icon settingsIcon" aria-hidden="true"></span>  Options Menu 
            </button>
            <div class="popupEnabledSlot">
                <button
                        id="popupEnabledButton"
                        type="button"
                        class="powerButton iconOnlyPowerButton"
                        aria-pressed="true"
                        aria-label="Disable extension"
                        title="Enable extension"
                >
                    <span class="powerIcon" aria-hidden="true"></span>
                </button>
            </div>
        </div>
        <p id="popupStatus" class="status"></p>
    </section>

    <section class="popupCard">
        <h2>Appearance</h2>
        <div class="field_grid compactFields appearanceGrid">
            <div class="appearanceFullRow popupThemeControls">
<!--                <span class="popupThemeLabel">Popup theme</span>-->
                <label class="popupThemeToggleRow" for="popupThemeToggle">
                    <input id="popupUseSystemTheme" type="checkbox">
                    <span>Use system theme</span>
                    <span class="popupThemeToggleText">Light</span>
                    <input id="popupThemeToggle" type="checkbox" role="switch" aria-label="Toggle dark theme">
                    <span class="popupThemeToggleText">Dark</span>
                </label>
            </div>
            <label class="fieldLabel" for="popupHintBoxDarkModeColor"><span>Dark box color</span><input
                    id="popupHintBoxDarkModeColor" type="color"></label>
            <label class="fieldLabel" for="popupHintTextDarkModeColor"><span>Dark text color</span><input
                    id="popupHintTextDarkModeColor" type="color"></label>
            <label class="fieldLabel" for="popupHintBoxDarkModeOpacity"><span>Dark opacity</span><input
                    id="popupHintBoxDarkModeOpacity" type="number" min="0" max="1" step="0.01"></label>
            <label class="fieldLabel" for="popupHintBoxLightModeColor"><span>Light box color</span><input
                    id="popupHintBoxLightModeColor" type="color"></label>
            <label class="fieldLabel" for="popupHintTextLightModeColor"><span>Light text color</span><input
                    id="popupHintTextLightModeColor" type="color"></label>
            <label class="fieldLabel" for="popupHintBoxLightModeOpacity"><span>Light opacity</span><input
                    id="popupHintBoxLightModeOpacity" type="number" min="0" max="1" step="0.01"></label>
            <label class="fieldLabel appearanceFullRow" for="popupHintTextFontSizeValue">
                <span class="labelWithTooltip tooltipable"
                      data-tooltip="em:&#10;Scales with the surrounding font size.&#10;&#10;px:&#10;Fixed pixel size.&#10;&#10;Use em for sizing that scales more naturally with zoom and surrounding text. Use px for a fixed on-screen size.">Hint text size <span
                        class="tooltipIcon" aria-hidden="true"></span></span>
                <div class="inlineFieldPair">
                    <input id="popupHintTextFontSizeValue" type="number" min="0.1" max="64" step="0.1">
                    <select id="popupHintTextFontSizeUnit">
                        <option value="em">em</option>
                        <option value="px">px</option>
                    </select>
                </div>
            </label>
            <label class="fieldLabel" for="popupHintPosition">
                <span>Hint position</span>
                <select id="popupHintPosition">
                    <option value="left">Left aligned</option>
                    <option value="center">Centered</option>
                </select>
            </label>
            <label class="fieldLabel" for="popupHintDisplay">
                <span class="labelWithTooltip tooltipable"
                      data-tooltip="Show:&#10;Show chord input by default. &#10;&#10;Hide:&#10;Hides chord input by default, but shows it on hover.&#10;&#10;Click any hint box to toggle between display modes.">Hint display <span
                        class="tooltipIcon" aria-hidden="true"></span></span>
                <select id="popupHintDisplay">
                    <option value="always">Show by default</option>
                    <option value="hover">Hide by default</option>
                </select>
            </label>
            <div class="appearanceFullRow popupPreviewGrid" aria-label="Live appearance preview">
                <div class="popupPreviewPanel popupPreviewPanelDark">
                    <div class="popupPreviewCanvas">
                        <div id="popupDarkPreviewWord" class="popupPreviewWord">
                            <div id="popupDarkPreviewHint" class="popupPreviewHint">chrd</div>
                            <span class="popupPreviewLabel">Dark</span>
                        </div>
                    </div>
                </div>
                <div class="popupPreviewPanel popupPreviewPanelLight">
                    <div class="popupPreviewCanvas">
                        <div id="popupLightPreviewWord" class="popupPreviewWord">
                            <div id="popupLightPreviewHint" class="popupPreviewHint">chrd</div>
                            <span class="popupPreviewLabel">Light</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="popupSaveSettingsCard">
        <div class="popupActionsRow">
            <button id="popupSaveButton" type="button">Save settings</button>
            <button id="popupResetButton" type="button" class="secondary">Revert to defaults</button>
        </div>
    </section>

</main>

<script src="shared.js"></script>
<script src="popup.js"></script>
</body>
</html>
